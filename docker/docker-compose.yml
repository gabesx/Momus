services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - '3000:3000'
    env_file:
      - ../.env.local
    environment:
      - TZ=Asia/Jakarta
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on: []

  inngest-dev:
    image: inngest/inngest:latest
    ports:
      - '8288:8288'
    command: ['inngest', 'dev', '-u', 'http://host.docker.internal:3000/api/inngest']
    extra_hosts:
      - 'host.docker.internal:host-gateway'

# Database: use `pnpm db:start` (Supabase CLI) — not included here.
# Supabase local (Momus) runs on ports 54421 (API), 54422 (DB), 54423 (Studio)
# so it does not clash with other local Supabase projects (default 5432x).
