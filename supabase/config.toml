# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
# Local ports offset from default 5432x so Momus can run beside other projects (e.g. horus).
project_id = "momus"

[api]
enabled = true
port = 54421
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54422
shadow_port = 54420
major_version = 15

[db.pooler]
enabled = false
port = 54429
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54423

[inbucket]
enabled = true
port = 54424

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Production Site URL (Momus Vercel). Local callbacks are allowlisted below.
site_url = "https://momus.vercel.app"
additional_redirect_urls = [
  "https://momus.vercel.app/auth/callback",
  "https://*.vercel.app/auth/callback",
  "http://127.0.0.1:3000/auth/callback",
  "http://localhost:3000/auth/callback",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Google OAuth2 is configured on the remote Momus project (Dashboard / last config push).
# Do not store client secrets in this file.
# Authorized redirect URI:
#   https://sdzoovwjcjqjgfoqszpf.supabase.co/auth/v1/callback

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8183

[analytics]
enabled = false
